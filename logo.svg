<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a5b4fc"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring glow -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>

  <!-- Main background circle -->
  <circle cx="60" cy="60" r="50" fill="url(#bgGrad)" stroke="rgba(165,180,252,0.25)" stroke-width="1.5"/>

  <!-- Graduation cap — flat top -->
  <polygon points="60,22 88,34 60,46 32,34" fill="url(#capGrad)" filter="url(#glow)"/>
  <!-- Cap board shine -->
  <polygon points="60,22 88,34 60,46 32,34" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Cap body / diploma square -->
  <path d="M42,38 L42,54 Q60,62 78,54 L78,38 L60,46 Z"
        fill="rgba(99,102,241,0.25)" stroke="rgba(165,180,252,0.5)" stroke-width="1" stroke-linejoin="round"/>

  <!-- Tassel string -->
  <line x1="88" y1="34" x2="88" y2="50" stroke="rgba(165,180,252,0.7)" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="88" cy="54" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>
  <circle cx="88" cy="54" r="2" fill="rgba(255,255,255,0.6)"/>

  <!-- Bar chart (bottom half) -->
  <!-- Bar 1 -->
  <rect x="28" y="76" width="9" height="16" rx="2" fill="url(#barGrad)" opacity="0.5"/>
  <!-- Bar 2 -->
  <rect x="41" y="69" width="9" height="23" rx="2" fill="url(#barGrad)" opacity="0.7"/>
  <!-- Bar 3 -->
  <rect x="54" y="62" width="9" height="30" rx="2" fill="url(#barGrad)" opacity="0.9"/>
  <!-- Bar 4 -->
  <rect x="67" y="65" width="9" height="27" rx="2" fill="url(#barGrad)" opacity="0.8"/>
  <!-- Bar 5 -->
  <rect x="80" y="60" width="9" height="32" rx="2" fill="url(#barGrad)"/>

  <!-- Trend line over bars -->
  <polyline points="32,74 45,67 58,60 71,63 84,57"
            fill="none" stroke="url(#accentGrad)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Trend dots -->
  <circle cx="32" cy="74" r="2.5" fill="#f43f5e"/>
  <circle cx="45" cy="67" r="2.5" fill="#f43f5e"/>
  <circle cx="58" cy="60" r="2.5" fill="#fb7185"/>
  <circle cx="71" cy="63" r="2.5" fill="#fb7185"/>
  <circle cx="84" cy="57" r="3"   fill="#fda4af" filter="url(#glow)"/>

  <!-- Bottom divider line -->
  <line x1="25" y1="95" x2="95" y2="95" stroke="rgba(165,180,252,0.15)" stroke-width="1"/>
</svg>
